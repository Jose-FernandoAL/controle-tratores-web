{% extends "base.html" %}{% block title %}Editar pedido{% endblock %}{% block content %}<header class="page-header"><div><h1>Editar pedido #{{ pedido.id }}</h1><p>Atualize os dados do atendimento.</p></div><a class="btn outline" href="{{ url_for('listar_pedidos') }}">Cancelar</a></header><section class="panel form-page"><form method="post"><label>Nome do agricultor<input required name="nome_agricultor" value="{{ pedido.nome_agricultor }}"></label><label>Telefone<input required name="telefone" value="{{ pedido.telefone }}"></label><div class="two-columns"><label>Serviço<select name="servico">{% for servico in servicos %}<option {{ 'selected' if servico==pedido.servico }}>{{ servico }}</option>{% endfor %}</select></label><label>Local / Sítio<input required name="local" value="{{ pedido.local }}"></label></div><label>Status<select name="status">{% for status in status_validos %}<option {{ 'selected' if status==pedido.status }}>{{ status }}</option>{% endfor %}</select></label><label>Observações<textarea rows="4" name="observacoes">{{ pedido.observacoes }}</textarea></label><button class="btn primary full">Salvar alterações</button></form></section>{% endblock %}

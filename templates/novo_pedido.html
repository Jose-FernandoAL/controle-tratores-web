{% extends "base.html" %}{% block title %}Novo pedido | Controle de Tratores{% endblock %}{% block content %}
<header class="page-header"><div><h1>Novo pedido</h1><p>O sistema encontrará automaticamente o primeiro horário disponível.</p></div><a class="btn outline" href="{{ url_for('listar_pedidos_rota') }}">Cancelar</a></header>
<section class="panel form-page"><form method="post"><label>Nome do agricultor<input required name="nome_agricultor"></label><label>Telefone<input required type="tel" name="telefone"></label><div class="two-columns"><label>Serviço<select required name="servico"><option value="">Selecione</option>{% for servico in servicos %}<option>{{ servico }}</option>{% endfor %}</select></label><label>Local / Sítio<input required name="local"></label></div><label class="short">Duração em horas<input type="number" min="1" name="duracao_horas" value="3"></label><label class="check"><input type="checkbox" name="tempo_indefinido"> Tempo indefinido</label><label>Observações<textarea rows="4" name="observacoes"></textarea></label><button class="btn primary full" type="submit">Cadastrar e buscar horário</button></form></section>
{% endblock %}
